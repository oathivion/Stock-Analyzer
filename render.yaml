services:
  - type: web
    name: ai-stock-research-assistant
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: SEC_USER_AGENT
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ai-stock-research-db
          property: connectionString

databases:
  - name: ai-stock-research-db
    plan: free
    databaseName: stock_research
    user: stock_research
